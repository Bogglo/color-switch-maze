<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>মাল্টিপ্লেয়ার টিক-ট্যাক-টো (সার্ভার ছাড়া)</title>
  <!-- PeerJS CDN: কোনো সার্ভার ছাড়াই P2P কানেকশন তৈরি করে -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
    body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
    .container{background:#fff;border-radius:16px;padding:24px;max-width:420px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.3);text-align:center}
    h1{color:#667eea;margin-bottom:8px}
    .panel{margin:12px 0;padding:12px;background:#f4f6ff;border-radius:10px}
    input,button{padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-size:14px;width:100%;margin:4px 0}
    button{background:#667eea;color:#fff;border:none;cursor:pointer;font-weight:600}
    button:hover{background:#5568d3}
    button:disabled{background:#aaa;cursor:not-allowed}
    #status{font-weight:600;margin:12px 0;padding:10px;background:#e8f4fd;border-radius:8px;min-height:40px}
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px auto;max-width:300px}
    .cell{aspect-ratio:1;background:#f9fafb;border:2px solid #667eea;border-radius:10px;font-size:2.5rem;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
    .cell:hover:not(.filled){background:#eef2ff}
    .cell.filled{cursor:default}
    .x{color:#e63946}
    .o{color:#4361ee}
    .hidden{display:none}
    #peer-id-box{background:#e8f4fd;padding:8px;border-radius:6px;margin:8px 0;font-family:monospace;word-break:break-all}
    .copy-btn{background:#10b981;padding:6px 10px;font-size:12px;width:auto;margin-left:6px}
    #log{font-size:12px;color:#666;margin-top:12px;max-height:80px;overflow-y:auto;text-align:left}
  </style>
</head>
<body>
<div class="container">
  <h1>❌ টিক-ট্যাক-টো ⭕</h1>
  
  <div id="lobby">
    <div class="panel">
      <button id="hostBtn">🏠 হোস্ট হোন (নতুন গেম)</button>
      <div id="host-ui" class="hidden">
        <p>আপনার পিয়ার আইডি (ফ্রেন্ডকে দিন):</p>
        <div style="display:flex;align-items:center">
          <div id="peer-id-box" id="myId">লোড হচ্ছে...</div>
          <button class="copy-btn" onclick="copyId()">কপি</button>
        </div>
        <p style="font-size:12px;color:#666;margin-top:6px">অপেক্ষা করুন... যখন কেউ জয়েন করবে গেম শুরু হবে</p>
      </div>
    </div>

    <div class="panel">
      <input id="joinId" placeholder="হোস্টের পিয়ার আইডি পেস্ট করুন">
      <button id="joinBtn">🔗 গেস্ট হিসেবে জয়েন করুন</button>
    </div>
  </div>

  <div id="gameUI" class="hidden">
    <div id="status">অপেক্ষা করুন...</div>
    <div class="board" id="board"></div>
    <button id="resetBtn" class="hidden" onclick="location.reload()">🔄 নতুন খেলা</button>
    <div id="log"></div>
  </div>
</div>

<script>
let peer, conn, mySymbol, isMyTurn = false, board = Array(9).fill("");
const status = document.getElementById('status');
const log = document.getElementById('log');

function addLog(msg){ log.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + log.innerHTML; }

function initBoard(){
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for(let i=0;i<9;i++){
    let c = document.createElement('div');
    c.className = 'cell';
    c.dataset.i = i;
    c.onclick = ()=> makeMove(i);
    boardEl.appendChild(c);
  }
}

function renderBoard(){
  document.querySelectorAll('.cell').forEach((c,i)=>{
    c.textContent = board[i];
    c.className = 'cell' + (board[i] ? ' filled '+board[i].toLowerCase() : '');
  });
}

function checkWin(){
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let p of ['X','O']){
    for(let [a,b,c] of wins){
      if(board[a]===p && board[b]===p && board[c]===p) return p;
    }
  }
  return board.includes('') ? null : 'Draw';
}

function endGame(result){
  isMyTurn = false;
  if(result==='Draw'){
    status.textContent = '🤝 ড্র হয়েছে!';
    status.style.background = '#f39c12';
  } else {
    status.textContent = `🏆 ${result} জিতেছে!`;
    status.style.background = result===mySymbol ? '#2ecc71' : '#e74c3c';
  }
  status.style.color = '#fff';
  document.getElementById('resetBtn').classList.remove('hidden');
  addLog(`গেম শেষ: ${result}`);
}

function makeMove(pos){
  if(!isMyTurn || board[pos]!=='') return;
  board[pos] = mySymbol;
  renderBoard();
  isMyTurn = false;
  status.textContent = `⏳ ${mySymbol==='X'?'O':'X'} এর পালা...`;
  conn.send({type:'move', pos});
  addLog(`আপনি চাল দিয়েছেন: ${pos}`);
  const w = checkWin();
  if(w) endGame(w);
}

function setupConnection(c){
  conn = c;
  conn.on('data', data=>{
    if(data.type==='move'){
      board[data.pos] = (mySymbol==='X'?'O':'X');
      renderBoard();
      isMyTurn = true;
      status.textContent = '✨ আপনার পালা!';
      status.style.background = '#e8f4fd';
      status.style.color = '#333';
      addLog(`অপোনেন্ট চাল দিয়েছে: ${data.pos}`);
      const w = checkWin();
      if(w) endGame(w);
    }
  });
  conn.on('close', ()=>{
    status.textContent = '⚠️ অপোনেন্ট ডিসকানেক্ট হয়েছে';
    status.style.background = '#e74c3c';
    addLog('কানেকশন বিচ্ছিন্ন');
  });
}

// হোস্ট লজিক
document.getElementById('hostBtn').onclick = ()=>{
  peer = new Peer();
  peer.on('open', id=>{
    document.getElementById('host-ui').classList.remove('hidden');
    document.getElementById('peer-id-box').textContent = id;
    document.getElementById('hostBtn').disabled = true;
    addLog(`হোস্ট তৈরি: ${id}`);
  });
  peer.on('connection', c=>{
    if(conn) return; // ইতিমধ্যে কেউ জয়েন করেছে
    setupConnection(c);
    mySymbol = 'X';
    isMyTurn = true;
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('gameUI').classList.remove('hidden');
    initBoard();
    status.textContent = '✨ আপনার পালা! (X)';
    addLog('গেস্ট জয়েন করেছে! গেম শুরু।');
  });
};

// গেস্ট লজিক
document.getElementById('joinBtn').onclick = ()=>{
  const hostId = document.getElementById('joinId').value.trim();
  if(!hostId) return alert('পিয়ার আইডি দিন');
  peer = new Peer();
  peer.on('open', ()=>{
    const c = peer.connect(hostId);
    c.on('open', ()=>{
      setupConnection(c);
      mySymbol = 'O';
      isMyTurn = false;
      document.getElementById('lobby').classList.add('hidden');
      document.getElementById('gameUI').classList.remove('hidden');
      initBoard();
      status.textContent = '⏳ হোস্টের অপেক্ষায়... (O)';
      addLog('হোস্টের সাথে কানেক্টেড!');
    });
    c.on('error', ()=> alert('কানেকশন ফেইল! আইডি চেক করুন।'));
  });
};

function copyId(){
  const id = document.getElementById('peer-id-box').textContent;
  navigator.clipboard.writeText(id).then(()=> alert('আইডি কপি হয়েছে!'));
}
</script>
</body>
</html>
