<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Color Maze</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
            border: 2px solid #333;
        }

        canvas {
            display: block;
            background-color: #111;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .message {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px currentColor;
            display: none;
            text-align: center;
        }

        #controls-hint {
            margin-top: 10px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-layer">
            <div id="msg-win" class="message" style="color: #00FF55;">LEVEL COMPLETE!</div>
            <div id="msg-lose" class="message" style="color: #FF0055;">CRASHED!</div>
        </div>
    </div>
    <div id="controls-hint">Use Arrow Keys or WASD to move. Match wall colors!</div>

    <!-- Import Utils -->
    <script src="utils/input.js"></script>
    <script src="utils/physics.js"></script>
    <script src="utils/renderer.js"></script>

    <script>
        // --- Game State & Logic ---
        const Game = {
            canvas: document.getElementById('gameCanvas'),
            levels: [],
            currentLevelIdx: 0,
            player: { x: 0, y: 0, radius: 10, color: '#FF0055', speed: 3 },
            colors: ['#FF0055', '#00FF55', '#00CCFF', '#FFFF00'], // Red, Green, Blue, Yellow
            colorIndex: 0,
            lastColorChange: 0,
            colorChangeInterval: 2000, // ms
            isRunning: false,
            offsetX: 0,
            offsetY: 0,

            async init() {
                InputHandler.init();
                Renderer.init(this.canvas);
                
                try {
                    const response = await fetch('levels.json');
                    this.levels = await response.json();
                    this.loadLevel(0);
                    this.loop();
                } catch (e) {
                    console.error("Failed to load levels.json", e);
                    alert("Error loading levels.json. Make sure you are running this on a local server (e.g., Live Server).");
                }
            },

            loadLevel(idx) {
                if (idx >= this.levels.length) {
                    alert("You beat all levels! Restarting.");
                    idx = 0;
                }
                this.currentLevelIdx = idx;
                const level = this.levels[idx];
                
                // Center the maze
                const mazeWidth = level.grid[0].length * level.tileSize;
                const mazeHeight = level.grid.length * level.tileSize;
                this.offsetX = (this.canvas.width - mazeWidth) / 2;
                this.offsetY = (this.canvas.height - mazeHeight) / 2;

                // Find start pos
                for(let r=0; r<level.grid.length; r++){
                    for(let c=0; c<level.grid[0].length; c++){
                        if(level.grid[r][c] === 8) {
                            this.player.x = this.offsetX + c * level.tileSize + level.tileSize/2;
                            this.player.y = this.offsetY + r * level.tileSize + level.tileSize/2;
                        }
                    }
                }
                
                // Reset Player Color
                this.colorIndex = 0;
                this.player.color = this.colors[0];
                this.isRunning = true;
                
                // Hide UI messages
                document.querySelectorAll('.message').forEach(el => el.style.display = 'none');
            },

            update(deltaTime) {
                if (!this.isRunning) return;

                const level = this.levels[this.currentLevelIdx];

                // 1. Color Cycling Logic
                if (Date.now() - this.lastColorChange > this.colorChangeInterval) {
                    this.colorIndex = (this.colorIndex + 1) % this.colors.length;
                    this.player.color = this.colors[this.colorIndex];
                    this.lastColorChange = Date.now();
                }

                // 2. Movement
                const dir = InputHandler.getDirection();
                if (dir.x !== 0 || dir.y !== 0) {
                    Physics.movePlayer(this.player, dir, this.player.speed, level.grid, level.tileSize);
                }

                // 3. Check Win/Loss
                // Loss is handled implicitly in movePlayer (collision stops movement), 
                // but if we wanted "Game Over on touch", we'd check collision separately.
                // For this puzzle style, stopping at the wall is standard.
                
                if (Physics.checkExit(this.player, level.grid, level.tileSize)) {
                    this.isRunning = false;
                    document.getElementById('msg-win').style.display = 'block';
                    setTimeout(() => this.loadLevel(this.currentLevelIdx + 1), 1500);
                }
            },

            draw() {
                Renderer.clear();
                const level = this.levels[this.currentLevelIdx];
                
                Renderer.drawGrid(level.grid, level.tileSize, this.offsetX, this.offsetY);
                Renderer.drawPlayer(this.player);
                Renderer.drawUI(level.name, 0);
            },

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };

        // Start Game
        window.onload = () => Game.init();

    </script>
</body>
</html>
